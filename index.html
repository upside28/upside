<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upside+ — Outils internes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #eef0f3; min-height: 100vh; color: #1a2235; }
  header { background: #1a2235; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 18px; font-weight: 600; color: #ffffff; letter-spacing: 0.02em; }
  .logo span { color: #c9a84c; }
  .admin-btn { background: transparent; border: 1px solid #c9a84c; color: #c9a84c; padding: 6px 16px; border-radius: 4px; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
  .admin-btn:hover { background: rgba(201, 168, 76, 0.1); }
  main { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6b7280; margin-bottom: 8px; }
  .page-title { font-size: 32px; font-weight: 700; color: #1a2235; margin-bottom: 8px; }
  .page-subtitle { font-size: 15px; color: #6b7280; margin-bottom: 40px; }
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .tool-card { background: #ffffff; border-radius: 10px; padding: 28px 24px; border: 1px solid #e5e7eb; transition: border-color 0.15s, transform 0.12s; text-decoration: none; display: flex; flex-direction: column; gap: 12px; }
  .tool-card:hover { border-color: #c9a84c; transform: translateY(-2px); }
  .tool-icon { width: 40px; height: 40px; background: #f3f0e8; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .tool-icon svg { width: 20px; height: 20px; stroke: #c9a84c; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .tool-name { font-size: 15px; font-weight: 600; color: #1a2235; line-height: 1.3; }
  .tool-arrow { font-size: 14px; color: #c9a84c; margin-top: auto; }
  .state-msg { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 15px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .modal { background: #ffffff; border-radius: 12px; width: 100%; max-width: 540px; margin: 20px; overflow: hidden; }
  .modal-header { background: #1a2235; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; color: #ffffff; }
  .modal-close { background: transparent; border: none; color: #9ca3af; font-size: 20px; cursor: pointer; }
  .modal-close:hover { color: #ffffff; }
  .modal-body { padding: 28px; }
  #password-screen label { display: block; font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 6px; }
  #password-screen input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px 14px; font-size: 14px; color: #1a2235; outline: none; margin-bottom: 8px; }
  #password-screen input:focus { border-color: #c9a84c; }
  .pwd-error { font-size: 13px; color: #dc2626; margin-bottom: 12px; min-height: 18px; }
  #admin-panel { display: none; }
  .admin-section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #9ca3af; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #f3f4f6; }
  .tool-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
  .tool-list-item-info { flex: 1; min-width: 0; }
  .tool-list-item-name { font-size: 14px; font-weight: 500; color: #1a2235; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool-list-item-url { font-size: 12px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .delete-btn { background: transparent; border: 1px solid #fca5a5; color: #dc2626; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 12px; }
  .delete-btn:hover { background: #fef2f2; }
  .add-tool-form { margin-top: 24px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 5px; }
  .form-row input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 9px 13px; font-size: 14px; color: #1a2235; outline: none; }
  .form-row input:focus { border-color: #c9a84c; }
  .btn-primary { width: 100%; background: #1a2235; color: #ffffff; border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary:hover { background: #253350; }
  .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-primary svg { width: 15px; height: 15px; stroke: #c9a84c; fill: none; stroke-width: 2; stroke-linecap: round; }
  .tool-list-empty { font-size: 13px; color: #9ca3af; text-align: center; padding: 20px 0; }
  .status-msg { font-size: 12px; text-align: center; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<header>
  <div class="logo">upside<span>+</span></div>
  <button class="admin-btn" id="admin-btn">Administration</button>
</header>

<main>
  <div class="section-label">Outils internes</div>
  <h1 class="page-title">Accès rapide</h1>
  <p class="page-subtitle">Cliquez sur un outil pour y accéder directement.</p>
  <div class="tools-grid" id="tools-grid">
    <div class="state-msg">Chargement...</div>
  </div>
</main>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Administration</h2>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div id="password-screen">
        <label for="pwd-input">Mot de passe administrateur</label>
        <input type="password" id="pwd-input" placeholder="••••••••••" />
        <div class="pwd-error" id="pwd-error"></div>
        <button class="btn-primary" id="pwd-submit-btn">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Accéder au panneau
        </button>
      </div>
      <div id="admin-panel">
        <div class="admin-section-title">Outils enregistrés</div>
        <div id="tool-list-admin"></div>
        <div class="add-tool-form">
          <div class="admin-section-title">Ajouter un outil</div>
          <div class="form-row">
            <label for="new-name">Nom de l'outil</label>
            <input type="text" id="new-name" placeholder="Ex. : Générateur LOI" />
          </div>
          <div class="form-row">
            <label for="new-url">Lien (URL complète)</label>
            <input type="url" id="new-url" placeholder="https://..." />
          </div>
          <button class="btn-primary" id="add-btn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ajouter l'outil
          </button>
          <div class="status-msg" id="status-msg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '$2a$10$0RhVeoym12QPLwMKx.3YsOPCVVFSms0OqPw2QDHRS9FtEuU4J7Eb2';
  const BIN_ID  = '69e5f04336566621a8d0e30e';
  const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
  const PASSWORD = 'Upside@28';
  let tools = [];

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg, color) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.style.color = color || '#6b7280';
    if (msg) setTimeout(() => { el.textContent = ''; }, 3000);
  }

  function renderGrid(list) {
    const grid = document.getElementById('tools-grid');
    grid.innerHTML = '';
    if (!list.length) {
      grid.innerHTML = '<div class="state-msg">Aucun outil configuré.<br>Accédez au panneau Administrateur pour en ajouter.</div>';
      return;
    }
    list.forEach(t => {
      const a = document.createElement('a');
      a.className = 'tool-card';
      a.href = t.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML =
        '<div class="tool-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>' +
        '<div class="tool-name">' + esc(t.name) + '</div>' +
        '<div class="tool-arrow">→ Ouvrir</div>';
      grid.appendChild(a);
    });
  }

  function renderAdminList(list) {
    const c = document.getElementById('tool-list-admin');
    c.innerHTML = '';
    if (!list.length) {
      c.innerHTML = '<div class="tool-list-empty">Aucun outil enregistré.</div>';
      return;
    }
    list.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'tool-list-item';
      div.innerHTML =
        '<div class="tool-list-item-info">' +
          '<div class="tool-list-item-name">' + esc(t.name) + '</div>' +
          '<div class="tool-list-item-url">' + esc(t.url) + '</div>' +
        '</div>' +
        '<button class="delete-btn" data-index="' + i + '">Supprimer</button>';
      c.appendChild(div);
    });
    c.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteTool(parseInt(btn.getAttribute('data-index'))));
    });
  }

  async function loadTools() {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const data = await res.json();
    tools = data.record.tools || [];
    renderGrid(tools);
  }

  async function saveTools() {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify({ tools })
    });
  }

  async function deleteTool(index) {
    tools.splice(index, 1);
    await saveTools();
    renderGrid(tools);
    renderAdminList(tools);
  }

  function openAdmin() {
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('password-screen').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-error').textContent = '';
    setTimeout(() => document.getElementById('pwd-input').focus(), 80);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  function checkPassword() {
    if (document.getElementById('pwd-input').value === PASSWORD) {
      document.getElementById('pwd-error').textContent = '';
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      renderAdminList(tools);
    } else {
      document.getElementById('pwd-error').textContent = 'Mot de passe incorrect.';
      document.getElementById('pwd-input').select();
    }
  }

  async function addTool() {
    const name = document.getElementById('new-name').value.trim();
    const raw  = document.getElementById('new-url').value.trim();
    if (!name || !raw) { setStatus('Nom et URL requis.', '#dc2626'); return; }
    const url = /^https?:\/\//i.test(raw) ? raw : 'https://' + raw;
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    setStatus('Enregistrement...', '#6b7280');
    try {
      tools.push({ name, url });
      await saveTools();
      document.getElementById('new-name').value = '';
      document.getElementById('new-url').value = '';
      setStatus('Outil ajouté.', '#16a34a');
      renderGrid(tools);
      renderAdminList(tools);
    } catch(e) {
      tools.pop();
      setStatus('Erreur lors de l\'ajout.', '#dc2626');
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('admin-btn').addEventListener('click', openAdmin);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('pwd-submit-btn').addEventListener('click', checkPassword);
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
  document.getElementById('add-btn').addEventListener('click', addTool);
  document.getElementById('new-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTool();
  });

  loadTools().catch(() => {
    document.getElementById('tools-grid').innerHTML =
      '<div class="state-msg">Erreur de chargement. Vérifiez votre connexion.</div>';
  });
</script>
</body>
</html>
